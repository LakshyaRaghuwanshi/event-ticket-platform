services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: changemeinprod!
    networks:
      - app-network

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8889:8080"
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak-data:/opt/keycloak/data
    command:
      - start-dev
      - --db=dev-file
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  keycloak-data:
    driver: local